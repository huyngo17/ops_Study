---
# ============================================================
# LOKI - Log storage
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: loki
    targetRevision: 6.x.x
    helm:
      values: |
        deploymentMode: SingleBinary
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          storage:
            type: filesystem
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
        singleBinary:
          replicas: 1
          nodeSelector:
            node-role.kubernetes.io/worker: ""
          persistence:
            enabled: true
            size: 10Gi
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
        gateway:
          enabled: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ============================================================
# MIMIR - Metrics storage (Prometheus-compatible remote write)
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mimir
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: mimir-distributed
    targetRevision: 5.x.x
    helm:
      values: |
        mimir:
          structuredConfig:
            multitenancy_enabled: false
            common:
              storage:
                backend: filesystem
                filesystem:
                  dir: /data/blocks
            ingester:
              ring:
                replication_factor: 1
            store_gateway:
              sharding_ring:
                replication_factor: 1
        ingester:
          replicas: 1
          zoneAwareReplication:
            enabled: false
          persistentVolume:
            enabled: true
            size: 20Gi
        store_gateway:
          replicas: 1
          zoneAwareReplication:
            enabled: false
          persistentVolume:
            enabled: true
            size: 5Gi
        distributor:
          replicas: 1
        querier:
          replicas: 1
        query_frontend:
          replicas: 1
        compactor:
          replicas: 1
          persistentVolume:
            enabled: true
            size: 5Gi
        ruler:
          replicas: 0
        alertmanager:
          enabled: false
        overrides_exporter:
          replicas: 1
        rollout_operator:
          enabled: false
        minio:
          enabled: false
        nginx:
          enabled: true
        metaMonitoring:
          enabled: false
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ============================================================
# TEMPO - Distributed tracing storage
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tempo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: tempo
    targetRevision: 1.x.x
    helm:
      values: |
        tempo:
          storage:
            trace:
              backend: local
              local:
                path: /var/tempo/traces
        persistence:
          enabled: true
          size: 10Gi
        nodeSelector:
          node-role.kubernetes.io/worker: ""
        service:
          type: ClusterIP
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ============================================================
# GRAFANA - UI: kết nối Loki + Mimir + Tempo
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: grafana
    targetRevision: 8.x.x
    helm:
      values: |
        adminUser: admin
        adminPassword: "123abc@A"
        nodeSelector:
          node-role.kubernetes.io/worker: ""
        persistence:
          enabled: true
          size: 8Gi
        ingress:
          enabled: true
          ingressClassName: nginx
          annotations:
            cert-manager.io/cluster-issuer: letsencrypt-prod
          hosts:
            - "grafana.ops-study.xyz"
          tls:
            - secretName: grafana-tls
              hosts:
                - "grafana.ops-study.xyz"
        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: Mimir
                type: prometheus
                url: http://mimir-nginx.monitoring.svc.cluster.local/prometheus
                access: proxy
                isDefault: true
              - name: Loki
                type: loki
                url: http://loki-gateway.monitoring.svc.cluster.local
                access: proxy
                isDefault: false
              - name: Tempo
                type: tempo
                url: http://tempo.monitoring.svc.cluster.local:3100
                access: proxy
                isDefault: false
        sidecar:
          datasources:
            enabled: true
            searchNamespace: ALL
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

---
# ============================================================
# ALLOY - Collector: scrape metrics + collect logs + traces
# ============================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: alloy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://grafana.github.io/helm-charts'
    chart: alloy
    targetRevision: 0.x.x
    helm:
      values: |
        alloy:
          configMap:
            create: true
            content: |
              // ============================================================
              // LOGS: Thu thập pod logs → Loki
              // ============================================================
              discovery.kubernetes "pods" {
                role = "pod"
              }

              discovery.relabel "pod_logs" {
                targets = discovery.kubernetes.pods.targets
                rule {
                  source_labels = ["__meta_kubernetes_namespace"]
                  target_label  = "namespace"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_name"]
                  target_label  = "pod"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_container_name"]
                  target_label  = "container"
                }
                rule {
                  source_labels = ["__meta_kubernetes_pod_node_name"]
                  target_label  = "node"
                }
              }

              loki.source.kubernetes "pods" {
                targets    = discovery.relabel.pod_logs.output
                forward_to = [loki.write.default.receiver]
              }

              loki.source.kubernetes_events "events" {
                forward_to = [loki.write.default.receiver]
              }

              loki.write "default" {
                endpoint {
                  url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
                }
              }

              // ============================================================
              // METRICS: Scrape kubelet + cAdvisor → Mimir
              // ============================================================
              discovery.kubernetes "nodes" {
                role = "node"
              }

              // Kubelet metrics
              prometheus.scrape "kubelet" {
                targets = discovery.kubernetes.nodes.targets
                scheme  = "https"
                tls_config {
                  insecure_skip_verify = true
                }
                bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                forward_to        = [prometheus.remote_write.mimir.receiver]
                job_name          = "kubelet"
              }

              // cAdvisor - container resource metrics
              discovery.relabel "cadvisor" {
                targets = discovery.kubernetes.nodes.targets
                rule {
                  target_label = "__metrics_path__"
                  replacement  = "/metrics/cadvisor"
                }
                rule {
                  target_label = "__scheme__"
                  replacement  = "https"
                }
              }

              prometheus.scrape "cadvisor" {
                targets = discovery.relabel.cadvisor.output
                tls_config {
                  insecure_skip_verify = true
                }
                bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
                forward_to        = [prometheus.remote_write.mimir.receiver]
                job_name          = "cadvisor"
              }

              prometheus.remote_write "mimir" {
                endpoint {
                  url = "http://mimir-nginx.monitoring.svc.cluster.local/api/v1/push"
                }
              }
        controller:
          type: daemonset
        rbac:
          create: true
        serviceAccount:
          create: true
        tolerations:
          - operator: Exists
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
