apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jenkins-cicd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://charts.jenkins.io'
    chart: jenkins
    targetRevision: 5.x.x
    helm:
      values: |
        controller:
          componentName: "jenkins-controller"
          admin:
            username: "admin"
            password: "123abc@A"
          persistence:
            enabled: true
            size: "20Gi"
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            hostName: "jenkins.ops-study.xyz"
            tls:
              - secretName: jenkins-tls
                hosts:
                  - "jenkins.ops-study.xyz"
          # Cài sẵn các plugin cần thiết
          installPlugins:
            - kubernetes:latest
            - workflow-aggregator:latest
            - git:latest
            - configuration-as-code:latest
            - docker-workflow:latest
            - pipeline-stage-view:latest

        # Agent chạy trong K8s pod - tạo khi build, xóa khi xong
        agent:
          enabled: true
          namespace: jenkins
          # Pod template mặc định cho agent
          podTemplates:
            kaniko: |
              - name: kaniko
                serviceAccount: jenkins
                containers:
                  - name: kaniko
                    image: gcr.io/kaniko-project/executor:debug
                    command: sleep
                    args: 9999999
                    ttyEnabled: true
                  - name: jnlp
                    image: jenkins/inbound-agent:latest

        # ServiceAccount để agent có quyền tạo pod
        serviceAccount:
          create: true
          name: jenkins

        rbac:
          create: true
          readSecrets: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: jenkins
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true