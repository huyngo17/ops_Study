- name: Check control plane init
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: control_plane_kubeadm_init_check

- name: "Khởi tạo control plane"
  ansible.builtin.command: kubeadm init --pod-network-cidr=10.244.0.0/16
  register: control_plane_kubeadm_init_output
  when: not control_plane_kubeadm_init_check.stat.exists
  changed_when: control_plane_kubeadm_init_output.rc == 0

- name: "Tạo thư mục .kube cho user ubuntu"
  ansible.builtin.file:
    path: /home/ubuntu/.kube       # Sửa từ ~/.kube thành đường dẫn tuyệt đối
    state: directory
    owner: ubuntu                  # Đảm bảo user ubuntu sở hữu thư mục này
    group: ubuntu
    mode: '0755'

- name: "Copy kubeconfig cho user ubuntu"
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config # Sửa từ ~/.kube/config thành đường dẫn tuyệt đối
    remote_src: true
    owner: ubuntu                  # Đảm bảo user ubuntu đọc được file
    group: ubuntu
    mode: '0600'

- name: "Cài đặt mạng Flannel (CNI)"
  ansible.builtin.command: kubectl apply -f https://github.com/flannel-io/flannel/releases/latest/download/kube-flannel.yml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Chờ các Pod hệ thống tối cao (API Server, ETCD...) trong kube-system Running hoàn toàn
  ansible.builtin.command: >
    kubectl get pods -n kube-system -o jsonpath='{.items[*].status.containerStatuses[*].ready}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: control_plane_kube_system_status
  changed_when: false
  retries: 20
  delay: 15
  # Kiểm tra xem có chữ "false" nào trong trạng thái sẵn sàng của container không.
  # Nếu tất cả đều "true", tức là không chứa "false" nữa thì đi tiếp.
  until: '"false" not in control_plane_kube_system_status.stdout'

- name: Chờ mạng Flannel rollout thành công (Sửa đúng sang namespace kube-flannel)
  ansible.builtin.command: >
    kubectl rollout status daemonset/kube-flannel-ds -n kube-flannel --timeout=60s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: control_plane_flannel_rollout
  changed_when: false
  retries: 5
  delay: 10
  until: control_plane_flannel_rollout.rc == 0

- name: "Lấy token join worker nodes"
  ansible.builtin.command: kubeadm token create --print-join-command
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: control_plane_join_command_output
  changed_when: false

- name: Lưu lệnh join trực tiếp vào máy Master
  ansible.builtin.set_fact:
    control_plane_kubernetes_join_command: "{{ control_plane_join_command_output.stdout }}"
