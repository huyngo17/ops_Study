- name: Check control plane init
  ansible.builtin.stat:
    path: /etc/kubernetes/admin.conf
  register: control_plane_kubeadm_init_check

- name: "Khởi tạo control plane"
  ansible.builtin.command: kubeadm init --pod-network-cidr=10.244.0.0/16
  register: control_plane_kubeadm_init_output
  when: not control_plane_kubeadm_init_check.stat.exists
  changed_when: control_plane_kubeadm_init_output.rc == 0

- name: "Tạo thư mục .kube cho user ubuntu"
  ansible.builtin.file:
    path: /home/ubuntu/.kube       # Sửa từ ~/.kube thành đường dẫn tuyệt đối
    state: directory
    owner: ubuntu                  # Đảm bảo user ubuntu sở hữu thư mục này
    group: ubuntu
    mode: '0755'

- name: "Copy kubeconfig cho user ubuntu"
  ansible.builtin.copy:
    src: /etc/kubernetes/admin.conf
    dest: /home/ubuntu/.kube/config # Sửa từ ~/.kube/config thành đường dẫn tuyệt đối
    remote_src: true
    owner: ubuntu                  # Đảm bảo user ubuntu đọc được file
    group: ubuntu
    mode: '0600'

- name: "Cài đặt Calico CNI (cho NetworkPolicy và bảo mật mạng)"
  ansible.builtin.command: kubectl apply -f https://docs.projectcalico.org/manifests/calico.yaml
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  changed_when: false

- name: Chờ các Pod hệ thống tối cao (API Server, ETCD...) trong kube-system Running hoàn toàn
  ansible.builtin.command: >
    kubectl get pods -n kube-system -o jsonpath='{.items[*].status.containerStatuses[*].ready}'
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: control_plane_kube_system_status
  changed_when: false
  retries: 20
  delay: 15
  until: '"false" not in control_plane_kube_system_status.stdout'

- name: Chờ Calico rollout thành công
  ansible.builtin.command:
    kubectl rollout status daemonset/calico-node -n kube-system --timeout=120s
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: control_plane_calico_rollout
  changed_when: false
  retries: 10
  delay: 15
  until: control_plane_calico_rollout.rc == 0

- name: "Lấy token join worker nodes"
  ansible.builtin.command: kubeadm token create --print-join-command
  environment:
    KUBECONFIG: /etc/kubernetes/admin.conf
  register: control_plane_join_command_output
  changed_when: false

- name: Lưu lệnh join trực tiếp vào máy Master
  ansible.builtin.set_fact:
    control_plane_kubernetes_join_command: "{{ control_plane_join_command_output.stdout }}"

- name: Tạo script backup etcd
  ansible.builtin.copy:
    dest: /usr/local/bin/etcd-backup.sh
    owner: root
    group: root
    mode: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      mkdir -p /var/backups/etcd
      export ETCDCTL_API=3
      /usr/bin/etcdctl \
        --cacert=/etc/kubernetes/pki/etcd/ca.crt \
        --cert=/etc/kubernetes/pki/etcd/server.crt \
        --key=/etc/kubernetes/pki/etcd/server.key \
        snapshot save /var/backups/etcd/etcd-$(date +%F-%H%M%S).db
      find /var/backups/etcd -type f -mtime +30 -delete

- name: Thêm cron job backup etcd hằng ngày
  ansible.builtin.cron:
    name: "etcd-daily-backup"
    minute: "0"
    hour: "2"
    job: "/usr/local/bin/etcd-backup.sh >> /var/log/etcd-backup.log 2>&1"
    user: root
