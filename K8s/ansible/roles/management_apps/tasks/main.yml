- name: Cài đặt pip3 và các dependency hệ thống
  apt:
    name:
      - python3-pip
      - python3-setuptools
      - apt-transport-https
    state: present
    update_cache: true

- name: Cài đặt thư viện kubernetes cho Python bằng pip
  pip:
    name: kubernetes
    state: present

- name: Đảm bảo thư mục lưu trữ keyrings tồn tại
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Tải GPG Key của Helm (dạng ASCII) về file tạm
  get_url:
    url: https://packages.buildkite.com/helm-linux/helm-debian/gpgkey
    dest: /tmp/helm.gpg.asc
    mode: '0644'

- name: Chuyển đổi GPG Key từ ASCII sang Binary (de-armor)
  command: gpg --dearmor --yes -o /etc/apt/keyrings/helm.gpg /tmp/helm.gpg.asc
  args:
    creates: /etc/apt/keyrings/helm.gpg

- name: Thêm APT Repository của Helm vào hệ thống
  apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main"
    filename: helm-stable-debian
    state: present

- name: Cài đặt Helm thông qua APT
  apt:
    name: helm
    state: present
    update_cache: true

- name: Đảm bảo thư mục .kube tồn tại trong thư mục nhà của user
  file:
    path: "~/.kube"
    state: directory
    mode: '0700'

- name: Sao chép admin.conf vào cấu hình định danh cá nhân (.kube/config)
  copy:
    src: /etc/kubernetes/admin.conf
    dest: "~/.kube/config"
    remote_src: true
    mode: '0600'

- name: Lấy danh sách node Kubernetes để gắn nhãn worker / topology
  kubernetes.core.k8s_info:
    kind: Node
    kubeconfig: /etc/kubernetes/admin.conf
  register: management_apps_k8s_nodes

- name: Gắn nhãn worker cho các node worker
  kubernetes.core.k8s:
    api_version: v1
    kind: Node
    name: "{{ item.metadata.name }}"
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      metadata:
        labels:
          node-role.kubernetes.io/worker: ""
  when: "'node-role.kubernetes.io/control-plane' not in item.metadata.labels"
  loop: "{{ management_apps_k8s_nodes.resources }}"

- name: Thêm và cập nhật các Helm Repository cho hệ thống
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
    force_update: true
  environment:
    PATH: "/usr/local/bin:{{ ansible_env.PATH }}"
  loop:
    - { name: 'ingress-nginx', url: 'https://kubernetes.github.io/ingress-nginx' }
    - { name: 'jetstack', url: 'https://charts.jetstack.io' }
    - { name: 'rancher-stable', url: 'https://releases.rancher.com/server-charts/stable' }
    - { name: 'harbor', url: 'https://helm.goharbor.io' }
    - { name: 'grafana', url: 'https://grafana.github.io/helm-charts' }
    - { name: 'jenkins', url: 'https://charts.jenkins.io' }
    - { name: 'hashicorp', url: 'https://helm.releases.hashicorp.com' }
    - { name: 'argo', url: 'https://argoproj.github.io/argo-helm' }

- name: Thêm Helm Repo cho AWS EBS CSI Driver
  kubernetes.core.helm_repository:
    name: aws-ebs-csi-driver
    repo_url: "https://kubernetes-sigs.github.io/aws-ebs-csi-driver"

- name: Cài đặt AWS EBS CSI Driver
  kubernetes.core.helm:
    name: aws-ebs-csi-driver
    chart_ref: aws-ebs-csi-driver/aws-ebs-csi-driver
    release_namespace: kube-system
    values:
      controller:
        serviceAccount:
          create: true
      node:
        nodeSelector:
          node-role.kubernetes.io/worker: ""

- name: Định nghĩa StorageClass gp3 cho AWS EBS
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: gp3
        annotations:
          # Đặt gp3 làm StorageClass mặc định cho toàn cụm K8s
          storageclass.kubernetes.io/is-default-class: "true"
      provisioner: ebs.csi.aws.com
      volumeBindingMode: WaitForFirstConsumer
      allowVolumeExpansion: true
      parameters:
        type: gp3
        encrypted: "true"

- name: Tạo namespace cho Ingress Nginx
  kubernetes.core.k8s:
    name: ingress-nginx
    api_version: v1
    kind: Namespace
    state: present
    kubeconfig: /etc/kubernetes/admin.conf

- name: Cài đặt NGINX Ingress Controller
  kubernetes.core.helm:
    name: ingress-nginx
    chart_ref: ingress-nginx/ingress-nginx
    release_namespace: ingress-nginx
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_timeout: "300s"
    values:
      controller:
        service:
          type: "NodePort"
          nodePorts:
            http: 30080
            https: 30443
        tolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoSchedule"
        affinity:
          nodeAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                preference:
                  matchExpressions:
                    - key: "node-role.kubernetes.io/worker"
                      operator: "In"
                      values:
                        - ""
        config:
          # Rất quan trọng: Giúp Ingress lấy đúng IP thật của Client (X-Forwarded-For) truyền qua ALB
          use-forwarded-headers: "true"
          compute-full-forwarded-for: "true"
        ingressClassResource:
          enabled: true
          default: true
        admissionWebhooks:
          enabled: false

- name: Cài đặt Cert-Manager bằng Helm
  kubernetes.core.helm:
    name: cert-manager
    chart_ref: jetstack/cert-manager
    release_namespace: cert-manager
    create_namespace: true
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_timeout: "300s"
    values:
      installCRDs: true

- name: Tạo Kubernetes Secret chứa Cloudflare API Token
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: cloudflare-api-token-secret
        namespace: cert-manager
      type: Opaque
      stringData:
        api-token: "{{ cloudflare_api_token }}"

- name: Tạo ClusterIssuer (Cấu hình Let's Encrypt)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
      spec:
        acme:
          server: https://acme-v02.api.letsencrypt.org/directory
          email: ngoquochuyvn2004@gmail.com
          privateKeySecretRef:
            name: letsencrypt-prod-account-key
          solvers:
            - dns01:
                cloudflare:
                  email: ngoquochuyvn2004@gmail.com
                  apiTokenSecretRef:
                    name: cloudflare-api-token-secret
                    key: api-token

- name: Xóa Namespace argocd cũ (Cho phép bỏ qua nếu kẹt)
  kubernetes.core.k8s:
    name: argocd
    kind: Namespace
    state: absent
    kubeconfig: /etc/kubernetes/admin.conf
    wait: true
    wait_timeout: 45
  register: management_apps_delete_ns_result
  ignore_errors: true

- name: Render file cấu hình ArgoCD từ template
  ansible.builtin.template:
    src: argocd-values.yaml.j2
    dest: /tmp/argocd-values.yaml
    mode: '0644'

- name: Cài đặt bộ não GitOps ArgoCD lên cụm K8s
  kubernetes.core.helm:
    name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    create_namespace: true
    kubeconfig: /etc/kubernetes/admin.conf
    reset_values: true
    wait: true
    wait_timeout: "600s"
    values_files:
      - /tmp/argocd-values.yaml

- name: Khởi tạo Root Application để ArgoCD tự động đồng bộ đống Apps trên Git
  kubernetes.core.k8s:
    state: present
    kubeconfig: /etc/kubernetes/admin.conf
    definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: root-bootstrap-apps
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: 'https://github.com/huyngo17/ops_Study'
          targetRevision: HEAD
          path: apps
        destination:
          server: 'https://kubernetes.default.svc'
          namespace: argocd
        syncPolicy:
          automated:
            prune: true
            selfHeal: true
