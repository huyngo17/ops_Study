- name: Tắt Swap và xóa swap
  command: swapoff -a
  changed_when: false

- lineinfile:
    path: /etc/fstab
    regexp: '^\s*[^#].*\sswap\s'
    state: absent

- name: ghi kernel vào file
  copy: 
    dest: /etc/modules-load.d/k8s.conf
    content: |
      overlay
      br_netfilter

- command: modprobe overlay
  changed_when: false

- command: modprobe br_netfilter
  changed_when: false

- name: Bật kernel params cho K8s networking
  copy: 
    dest: /etc/sysctl.d/k8s.conf
    content: |
      net.bridge.bridge-nf-call-iptables  = 1
      net.bridge.bridge-nf-call-ip6tables = 1
      net.ipv4.ip_forward                 = 1
- command: sysctl --system
  changed_when: false

- name: Cài containerd
  apt: 
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- file: 
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: cài gpg phục vụ việc xác minh
  get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu
      jammy stable
    filename: docker
    state: present

- apt: 
    name: containerd.io
    state: present
    update_cache: true

- name: cấu hình containerd dùng systemdcgroup
  shell:
    cmd: containerd config default > /etc/containerd/config.toml
  args:
    creates: /etc/containerd/config.toml

- lineinfile:
     path: /etc/containerd/config.toml
     regexp: 'SystemdCgroup = false'
     line: '            SystemdCgroup = true'
  notify: restart containerd

- name: dùng systemctl enabled containerd on boot
  systemd:
    name: containerd
    enabled: true
    state: started

- name: Cài kubeadm kubelet kubectl
  get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes.asc
    mode: '0644'

- apt_repository: 
    repo: >-
      deb [signed-by=/etc/apt/keyrings/kubernetes.asc]
      https://pkgs.k8s.io/core:/stable:/v1.31/deb/ /
    filename: kubernetes
    state: present

- apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: true

- dpkg_selections:
    name: "{{item}}"
    selection: hold
    loop:
      - kubelet
      - kubeadm
      - kubectl

- systemd:
    name:
    enabled: true